<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Resource Centre | BBPS Simhadri</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af; 
            --secondary: #7c3aed;
            --accent: #f59e0b;
            --bg: #f8fafc; 
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        /* --- Header with Highlighted Logo --- */
        header {
            padding: 4rem 1rem 3rem;
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .school-logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        /* Golden Halo Effect */
        .school-logo-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: rgba(245, 158, 11, 0.15);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
            z-index: 0;
            animation: pulse 3s infinite;
        }

        .school-logo {
            position: relative;
            z-index: 1;
            width: 110px;
            height: 110px;
            object-fit: contain;
            background: white;
            padding: 10px;
            border-radius: 50%;
            border: 3px solid var(--accent);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.3; }
        }

        h1 { font-size: 2.8rem; margin: 10px 0; color: var(--primary); font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem; }

        /* --- Search & Filters --- */
        .search-container { margin: 0 auto 2rem; max-width: 600px; padding: 0 20px; }

        #searchInput {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: white;
            color: var(--text-main);
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: var(--shadow);
            outline: none;
        }

        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1); }

        .filter-menu { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: white;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* --- Grid & Cards --- */
        .container { max-width: 1200px; margin: 3rem auto; padding: 0 20px; }
        
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .badge {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 8px;
            width: fit-content;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .card h3 { margin: 0 0 12px; color: var(--primary); font-size: 1.4rem; }
        .card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; flex-grow: 1; margin-bottom: 1.5rem; }
        
        .visit-btn {
            text-decoration: none;
            color: white;
            background: var(--primary);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            transition: 0.3s;
        }

        .visit-btn:hover { background: #1e3a8a; box-shadow: 0 5px 15px rgba(30, 64, 175, 0.3); }

        footer {
            text-align: center;
            padding: 4rem 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
            color: var(--text-muted);
            margin-top: 5rem;
        }
    </style>
</head>
<body>

<header>
    <div class="school-logo-container">
        <img src="school_logo.png" alt="BBPS Logo" class="school-logo">
    </div>
    
    <h1>Digital Resource Centre</h1>
    <p class="subtitle">Official Open-Access Portal for BBPS Simhadri</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search resources, magazines, or topics..." onkeyup="filterLibrary()">
    </div>

    <div class="filter-menu">
        <button class="filter-btn active" onclick="filterCategory('all', this)">All Resources</button>
        <button class="filter-btn" onclick="filterCategory('student', this)">Student Corner</button>
        <button class="filter-btn" onclick="filterCategory('teacher', this)">Teacher's Hub</button>
        <button class="filter-btn" onclick="filterCategory('magazines', this)">Magazines</button>
        <button class="filter-btn" onclick="filterCategory('exams', this)">Exams</button>
    </div>
</header>

<div class="container">
    <div class="library-grid" id="libraryGrid">
        </div>
</div>

<footer>
    <p>&copy; 2026 BBPS Simhadri | Developed for Excellence</p>
    <p style="font-size: 0.8rem; margin-top: 10px;">Access to knowledge is access to the future.</p>
</footer>

<script>
    const resources = [
        // --- STUDENTS ---
        { title: "DIKSHA Portal", desc: "National platform for school education. Access NCERT textbooks and QR-coded digital lessons.", cat: "student", url: "https://diksha.gov.in/" },
        { title: "e-Pathshala", desc: "A joint initiative of Ministry of Education and NCERT. Free access to all educational e-resources.", cat: "student", url: "https://epathshala.nic.in/" },
        { title: "Khan Academy India", desc: "World-class practice exercises and instructional videos for Math and Science (NCERT mapped).", cat: "student", url: "https://hi.khanacademy.org/" },
        { title: "Amrita Virtual Labs", desc: "Interactive simulations for Physics, Chemistry, and Biology experiments for classes 9-12.", cat: "student", url: "https://vlab.amrita.edu/" },
        { title: "StoryWeaver", desc: "A massive open-source library of multilingual storybooks for primary and middle school students.", cat: "student", url: "https://storyweaver.org.in/" },
        { title: "National Digital Library", desc: "A virtual repository of learning resources with millions of books, hosted by IIT Kharagpur.", cat: "student", url: "https://ndl.iitkgp.ac.in/" },

        // --- MAGAZINES ---
        { title: "Science Reporter", desc: "India's most popular science monthly magazine published by CSIR-NIScPR.", cat: "magazines", url: "https://niscpr.res.in/periodicals/science-reporter" },
        { title: "Teacher Plus", desc: "A magazine that fosters a sense of community among teachers and creative learners.", cat: "magazines", url: "https://www.teacherplus.org/" },
        { title: "Down To Earth", desc: "Leading magazine on environmental issues, health, and sustainable development.", cat: "magazines", url: "https://www.downtoearth.org.in/" },
        { title: "Nat Geo Kids", desc: "Interactive digital resources for young explorers interested in wildlife and geography.", cat: "magazines", url: "https://kids.nationalgeographic.com/" },
        { title: "Children's World", desc: "One of the oldest magazines for children to encourage creative writing and reading.", cat: "magazines", url: "https://www.childrensworld.org.in/" },

        // --- TEACHERS ---
        { title: "CBSE Academic", desc: "Latest circulars, curriculum updates, and teacher manuals for CBSE affiliation.", cat: "teacher", url: "https://cbseacademic.nic.in/" },
        { title: "NROER", desc: "National Repository for Open Educational Resources. Repository for documents, audio, and videos.", cat: "teacher", url: "https://nroer.gov.in/" },
        { title: "NISHTHA Training", desc: "National Initiative for School Heads' and Teachers' Holistic Advancement.", cat: "teacher", url: "https://itpd.ncert.gov.in/" },
        { title: "OER Commons", desc: "Public digital library of open educational resources for curriculum planning.", cat: "teacher", url: "https://www.oercommons.org/" },

        // --- EXAMS ---
        { title: "Sample Papers (X/XII)", desc: "Download the latest board exam sample question papers and marking schemes.", cat: "exams", url: "https://cbseacademic.nic.in/sqp_classx_2024-25.html" },
        { title: "CBSE Question Bank", desc: "Official question bank focusing on Case-study and Competency-based questions.", cat: "exams", url: "https://cbseacademic.nic.in/qb10.html" },
        { title: "Pariksha Pe Charcha", desc: "Valuable tips for students and parents to manage exam stress from PM India.", cat: "exams", url: "https://innovateindia.mygov.in/ppc-2026/" }
    ];

    function getCatColor(cat) {
        switch(cat) {
            case 'teacher': return '#059669';   // Emerald
            case 'exams': return '#dc2626';     // Red
            case 'magazines': return '#d97706'; // Amber
            default: return '#7c3aed';          // Purple
        }
    }

    function displayResources(data) {
        const grid = document.getElementById('libraryGrid');
        
        if (data.length === 0) {
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                    <span style="font-size: 4rem;">🔍</span>
                    <h3 style="color: var(--text-muted); margin-top: 1rem;">No resources found matching your search.</h3>
                    <p>Try using different keywords like "NCERT", "Physics", or "Board".</p>
                </div>`;
            return;
        }

        grid.innerHTML = data.map(res => `
            <div class="card">
                <span class="badge" style="background:${getCatColor(res.cat)}15; color:${getCatColor(res.cat)}">
                    ${res.cat}
                </span>
                <h3>${res.title}</h3>
                <p>${res.desc}</p>
                <a href="${res.url}" target="_blank" class="visit-btn">Open Resource</a>
            </div>
        `).join('');
    }

    function filterCategory(category, btn) {
        // UI Update
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Logic
        if(category === 'all') {
            displayResources(resources);
        } else {
            const filtered = resources.filter(res => res.cat === category);
            displayResources(filtered);
        }
    }

    function filterLibrary() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = resources.filter(res => 
            res.title.toLowerCase().includes(term) || 
            res.desc.toLowerCase().includes(term) ||
            res.cat.toLowerCase().includes(term)
        );
        displayResources(filtered);
    }

    // Initial Display
    displayResources(resources);
</script>

</body>
</html>
