<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Resource Centre | BBPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af; 
            --secondary: #7c3aed;
            --accent: #f59e0b;
            --bg: #f8fafc; 
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        header {
            padding: 4rem 1rem 3rem;
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .school-logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .school-logo-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: rgba(245, 158, 11, 0.15);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
            z-index: 0;
            animation: pulse 3s infinite;
        }

        .school-logo {
            position: relative;
            z-index: 1;
            width: 110px;
            height: 110px;
            object-fit: contain;
            background: white;
            padding: 10px;
            border-radius: 50%;
            border: 3px solid var(--accent);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.3; }
        }

        h1 { font-size: 2.8rem; margin: 10px 0; color: var(--primary); font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem; }

        .search-container { margin: 0 auto 2rem; max-width: 600px; padding: 0 20px; }

        #searchInput {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: white;
            color: var(--text-main);
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: var(--shadow);
            outline: none;
        }

        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1); }

        .filter-menu { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: white;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .container { max-width: 1200px; margin: 3rem auto; padding: 0 20px; }
        
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .badge {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 8px;
            width: fit-content;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .card h3 { margin: 0 0 12px; color: var(--primary); font-size: 1.2rem; min-height: 3rem; display: flex; align-items: center; }
        .card p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; flex-grow: 1; margin-bottom: 1.5rem; }
        
        .visit-btn {
            text-decoration: none;
            color: white;
            background: var(--primary);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            transition: 0.3s;
        }

        .visit-btn:hover { background: #1e3a8a; box-shadow: 0 5px 15px rgba(30, 64, 175, 0.3); }

        footer {
            text-align: center;
            padding: 4rem 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
            color: var(--text-muted);
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header>
    <div class="school-logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/en/3/3a/Bal_Bharati_Public_School_logo.png" alt="BBPS Logo" class="school-logo">
    </div>
    
    <h1>Digital Resource Centre</h1>
    <p class="subtitle">Official Annexure I E-Library Portal [cite: 7]</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for books, circulars, or newspapers..." onkeyup="filterLibrary()">
    </div>

    <div class="filter-menu">
        <button class="filter-btn active" onclick="filterCategory('all', this)">All Resources</button>
        <button class="filter-btn" onclick="filterCategory('Curriculum', this)">Curriculum</button>
        <button class="filter-btn" onclick="filterCategory('Story Time', this)">Story Time</button>
        <button class="filter-btn" onclick="filterCategory('Reference', this)">Reference</button>
        <button class="filter-btn" onclick="filterCategory('Training', this)">Teacher Training</button>
        <button class="filter-btn" onclick="filterCategory('News', this)">News & Magazines</button>
    </div>
</header>

<div class="container">
    <div class="library-grid" id="libraryGrid"></div>
</div>

<footer>
    <p>&copy; 2026 Bal Bharati Public School [cite: 1]</p>
    <p style="font-size: 0.8rem; margin-top: 10px;">Education is the movement from darkness to light.</p>
</footer>

<script>
    const resources = [
        // --- CURRICULUM SUPPORT ---
        { title: "CBSE Manuals", desc: "Official academic manuals for secondary education.", cat: "Curriculum", url: "https://cbseacademic.nic.in/manual.html" },
        { title: "CBSE Curriculum 2023", desc: "Current curriculum and syllabus updates.", cat: "Curriculum", url: "https://cbseacademic.nic.in/curriculum_2023.html" },
        { title: "CBSE Circulars", desc: "Latest notifications and academic circulars.", cat: "Curriculum", url: "https://cbseacademic.nic.in/circulars.html" },
        { title: "NCERT Text Books", desc: "Digital copies of primary and secondary textbooks.", cat: "Curriculum", url: "https://ncert.nic.in/textbook.php" },
        { title: "NEP Policy", desc: "National Education Policy final document.", cat: "Curriculum", url: "https://www.education.gov.in/sites/upload_files/mhrd/files/NEP_Final_English_0.pdf" },
        { title: "NIPUN BHARAT", desc: "National initiative for proficiency in reading and numeracy.", cat: "Curriculum", url: "https://nipunbharat.education.gov.in/" },

        // --- STORY TIME / READING ---
        { title: "Storyline Online", desc: "Children's literacy resource with celebrated actors reading aloud.", cat: "Story Time", url: "https://www.storylineonline.net/" },
        { title: "StoryMirror", desc: "Platform for creative writing and reading short stories.", cat: "Story Time", url: "https://storymirror.com" },
        { title: "Storyweaver", desc: "Multilingual stories for children to read and enjoy.", cat: "Story Time", url: "https://storyweaver.org.in/en/" },
        { title: "Hindi Story Time", desc: "A collection of motivational and fun stories in Hindi.", cat: "Story Time", url: "https://motivationalstoryinhindi.com/story-for-kids-in-hindi/" },
        { title: "e-Pustakalay", desc: "Extensive library for Hindi digital books.", cat: "Story Time", url: "https://epustakalay.com/" },

        // --- REFERENCE ---
        { title: "Encyclopedia Britannica", desc: "World-renowned source for facts and reference materials.", cat: "Reference", url: "https://www.britannica.com/" },
        { title: "World History Encyclopedia", desc: "Resource for ancient, medieval, and modern history.", cat: "Reference", url: "https://www.worldhistory.org/" },
        { title: "Biography Online", desc: "Profiles of influential people throughout history.", cat: "Reference", url: "https://www.biographyonline.net/" },
        { title: "Oxford Owl", desc: "Free ebooks and support for reading and math.", cat: "Reference", url: "https://www.oxfordowl.co.uk/" },

        // --- TRAINING ---
        { title: "DIKSHA Portal", desc: "National training and resource portal for teachers.", cat: "Training", url: "https://diksha.gov.in/index.html" },
        { title: "NISHTHA Training", desc: "Teacher training for holistic development.", cat: "Training", url: "https://www.india.gov.in/spotlight/nishtha" },
        { title: "SWAYAM", desc: "Online courses and certifications for various disciplines.", cat: "Training", url: "https://swayam.gov.in/explorer" },

        // --- NEWS & MAGAZINES ---
        { title: "The Hindu", desc: "Digital edition of The Hindu newspaper.", cat: "News", url: "https://www.thehindu.com/" },
        { title: "Indian Express", desc: "Latest news and investigative journalism.", cat: "News", url: "https://indianexpress.com/" },
        { title: "National Geographic", desc: "Science, nature, and geography magazine.", cat: "News", url: "https://www.nationalgeographic.com/magazine/" },
        { title: "India Today", desc: "Weekly news magazine and current affairs.", cat: "News", url: "https://www.indiatoday.in" },

        // --- PAID RESOURCES ---
        { title: "British Council Library", desc: "Access to world-class digital learning materials.", cat: "Paid", url: "https://www.britishcouncil.in/library/digital-library" }
    ];

    function getCatColor(cat) {
        switch(cat) {
            case 'Curriculum': return '#059669'; 
            case 'Story Time': return '#7c3aed';
            case 'Reference': return '#2563eb';
            case 'Training': return '#db2777';
            case 'News': return '#d97706';
            default: return '#64748b';
        }
    }

    function displayResources(data) {
        const grid = document.getElementById('libraryGrid');
        if (data.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem;"><h3>No results found.</h3></div>`;
            return;
        }
        grid.innerHTML = data.map(res => `
            <div class="card">
                <span class="badge" style="background:${getCatColor(res.cat)}15; color:${getCatColor(res.cat)}">${res.cat}</span>
                <h3>${res.title}</h3>
                <p>${res.desc}</p>
                <a href="${res.url}" target="_blank" class="visit-btn">Visit Website</a>
            </div>
        `).join('');
    }

    function filterCategory(category, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(category === 'all') {
            displayResources(resources);
        } else {
            const filtered = resources.filter(res => res.cat === category);
            displayResources(filtered);
        }
    }

    function filterLibrary() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = resources.filter(res => 
            res.title.toLowerCase().includes(term) || 
            res.cat.toLowerCase().includes(term)
        );
        displayResources(filtered);
    }

    displayResources(resources);
</script>

</body>
</html>
